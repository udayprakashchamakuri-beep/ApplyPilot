<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APPLYPILOT | Redirecting</title>
    <script>
      (function () {
        const basePath = window.location.pathname.replace(/\/[^/]*$/, "/");
        try {
          localStorage.setItem("applypilot:route", "calendar");
        } catch {}
        window.name = "applypilot:route=calendar";
        window.location.replace(basePath);
      })();
    </script>
  </head>
  <body>
    <p>Redirecting to APPLYPILOT Interview Calendar...</p>
  </body>
</html>
