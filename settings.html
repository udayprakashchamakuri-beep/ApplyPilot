<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APPLYPILOT | Preferences</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
      body {
        font-family: Inter, sans-serif;
      }
      .font-headline {
        font-family: Manrope, sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900">
    <div class="min-h-screen grid grid-cols-1 lg:grid-cols-[260px_1fr]">
      <aside class="bg-white border-r border-slate-200 p-6">
        <div class="mb-8">
          <h1 class="font-headline text-2xl font-black text-indigo-700">APPLYPILOT</h1>
          <p class="text-xs uppercase tracking-widest text-slate-500 font-semibold">Career Intelligence</p>
        </div>
        <nav class="space-y-2 text-sm">
          <a class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-slate-100" href="index.html"><span class="material-symbols-outlined text-[18px]">description</span>Intake</a>
          <a class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-slate-100" href="resume.html"><span class="material-symbols-outlined text-[18px]">person</span>My Resume</a>
          <a class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-slate-100" href="dashboard.html"><span class="material-symbols-outlined text-[18px]">dashboard</span>Suited Jobs</a>
          <a class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-slate-100" href="tailoring.html"><span class="material-symbols-outlined text-[18px]">send</span>Applications</a>
          <a class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-slate-100" href="calendar.html"><span class="material-symbols-outlined text-[18px]">calendar_today</span>Interview Calendar</a>
          <a class="flex items-center gap-2 px-3 py-2 rounded-lg bg-indigo-50 text-indigo-700 font-semibold" href="settings.html"><span class="material-symbols-outlined text-[18px]">settings</span>Preferences</a>
        </nav>
        <button data-new-application class="mt-8 w-full px-4 py-3 rounded-lg bg-indigo-600 text-white font-semibold">New Application</button>
      </aside>

      <main class="p-6 lg:p-10">
        <div class="max-w-3xl mx-auto">
          <p class="text-xs uppercase tracking-widest text-slate-500 font-semibold mb-3">Search Preferences</p>
          <h2 class="font-headline text-3xl font-black text-slate-900">Preferences</h2>
          <p class="text-slate-600 mt-2">These values are used for the next resume intake run.</p>

          <form data-settings-form class="mt-8 bg-white border border-slate-200 rounded-xl p-6 space-y-5">
            <div>
              <label class="block text-sm font-semibold mb-1">Target Roles (comma-separated)</label>
              <input data-setting-roles class="w-full rounded-lg border-slate-300" type="text" />
            </div>
            <div>
              <label class="block text-sm font-semibold mb-1">Preferred Locations (comma-separated)</label>
              <input data-setting-locations class="w-full rounded-lg border-slate-300" type="text" />
            </div>
            <div class="grid sm:grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-semibold mb-1">Minimum Match Threshold</label>
                <input data-setting-threshold class="w-full rounded-lg border-slate-300" type="number" min="50" max="99" />
              </div>
              <div>
                <label class="block text-sm font-semibold mb-1">Minimum Salary</label>
                <input data-setting-min-salary class="w-full rounded-lg border-slate-300" type="text" />
              </div>
            </div>
            <div>
              <label class="block text-sm font-semibold mb-1">Default Sources (comma-separated)</label>
              <input data-setting-sources class="w-full rounded-lg border-slate-300" type="text" />
            </div>
            <div class="flex gap-3">
              <button class="px-5 py-3 rounded-lg bg-indigo-600 text-white font-semibold" type="submit">Save Preferences</button>
              <a class="px-5 py-3 rounded-lg bg-slate-100 text-slate-700 font-semibold" href="index.html">Back to Intake</a>
            </div>
            <p data-settings-status class="text-sm text-slate-600"></p>
          </form>
        </div>
      </main>
    </div>
    <script src="./config.js"></script>
    <script src="./frontend.js"></script>
  </body>
</html>
