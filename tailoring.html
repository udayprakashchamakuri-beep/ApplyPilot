<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APPLYPILOT | Redirecting</title>
    <script>
      (function () {
        const basePath = window.location.pathname.replace(/\/[^/]*$/, "/");
        window.location.replace(basePath + "#applications");
      })();
    </script>
  </head>
  <body>
    <p>Redirecting to APPLYPILOT Applications...</p>
  </body>
</html>
